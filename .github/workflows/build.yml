name: Build AdBlocker Xposed Module

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure gradle wrapper exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -sL -o gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List build outputs
        run: |
          find app/build/outputs -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdBlockerXposed-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create LSPosed Module ZIP
        run: |
          mkdir -p module_zip
          cp app/build/outputs/apk/release/*.apk module_zip/adblocker-xposed.apk
          cp app/src/main/assets/xposed_init module_zip/
          cp app/src/main/AndroidManifest.xml module_zip/
          cd module_zip
          zip -r ../AdBlockerXposed-module.zip .

      - name: Upload Module ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AdBlockerXposed-module
          path: AdBlockerXposed-module.zip

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            AdBlockerXposed-module.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
